<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CGA Viewer</title>
  <link rel="stylesheet" href="./styles.css?v=1.30.44" />
  <script type="importmap">
    {
      "imports": {
        "graphology": "https://esm.sh/graphology@0.26.0",
        "sigma": "https://esm.sh/sigma@3.0.3"
      }
    }
  </script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/admin" title="Back to admin">
        <span>CGA Viewer</span>
      </a>
      <div class="topbar-actions">
        <a class="link-button" href="http://localhost:13000/graph" target="_blank" rel="noreferrer">Browser</a>
        <button id="copy-falkor-url" class="btn icon-button" type="button" aria-label="Copy FalkorDB connection URL" title="Copy FalkorDB connection URL">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <rect x="9" y="9" width="11" height="11" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </header>

    <main id="workspace" class="workspace">
      <button id="toggle-panel" class="panel-toggle" type="button" aria-label="Collapse controls" title="Collapse controls"></button>
      <aside class="control-panel" aria-label="Graph controls">
        <section>
          <div class="section-title">Project</div>
          <label for="project-select">Graph</label>
          <select id="project-select"></select>
          <div class="field-row">
            <button id="refresh-projects" class="btn secondary" type="button">Refresh</button>
          </div>
        </section>

        <section>
          <div class="section-title">Graph</div>
          <label for="search-input">Search</label>
          <input id="search-input" placeholder="symbol, path, or name" />

          <label for="chunk-limit">Display Nodes</label>
          <input id="chunk-limit" type="number" min="1" max="500000" step="250" value="250" />

          <div id="edge-grid" class="edge-grid" aria-label="Edge types"></div>

          <div class="field-row">
            <button id="load-first" class="btn primary" type="button">Load</button>
            <button id="clear-graph" class="btn secondary" type="button">Clear</button>
          </div>
        </section>

        <section>
          <div class="section-title">View</div>
          <div class="field-row">
            <button id="fit-view" class="btn secondary" type="button">Fit</button>
            <button id="toggle-sim" class="btn secondary" type="button">Play</button>
            <button id="toggle-edges" class="btn secondary" type="button" aria-pressed="false">Show Edges</button>
            <button id="toggle-performance" class="btn secondary" type="button" aria-pressed="true">Performance On</button>
            <button id="open-layout-settings" class="btn secondary" type="button">Settings</button>
          </div>
          <div class="filter-title">Rendering Node Types</div>
          <div class="node-type-grid" aria-label="Rendering Node Types">
            <label style="--node-color:#e06c75"><input type="checkbox" name="node-type" value="Repository" checked /><i class="node-dot"></i><span>Repository</span></label>
            <label style="--node-color:#61afef"><input type="checkbox" name="node-type" value="File" checked /><i class="node-dot"></i><span>File</span></label>
            <label style="--node-color:#c678dd"><input type="checkbox" name="node-type" value="Symbol" checked /><i class="node-dot"></i><span>Symbol</span></label>
            <label style="--node-color:#d19a66"><input type="checkbox" name="node-type" value="Variable" checked /><i class="node-dot"></i><span>Variable</span></label>
            <label style="--node-color:#7f848e"><input type="checkbox" name="node-type" value="Node" checked /><i class="node-dot"></i><span>Other</span></label>
          </div>
        </section>

        <section class="stats-panel">
          <div class="section-title">Stats</div>
          <dl>
            <div><dt>Database nodes</dt><dd id="db-nodes">-</dd></div>
            <div><dt>Database edges</dt><dd id="db-edges">-</dd></div>
            <div><dt>Loaded nodes</dt><dd id="loaded-nodes">0</dd></div>
            <div><dt>Loaded edges</dt><dd id="loaded-edges">0</dd></div>
            <div><dt>Cursor</dt><dd id="cursor-value">0</dd></div>
          </dl>
        </section>

      </aside>

      <section class="graph-stage" aria-label="Graph canvas">
        <div id="graph-root"></div>
        <div id="focus-layer-control" class="focus-layer-control" aria-label="Focused graph layers" hidden>
          <div class="focus-layer-header">
            <span id="focus-node-label" class="focus-node-label"></span>
            <button id="clear-focus" class="focus-clear-button" type="button" aria-label="Clear focused graph" title="Clear focused graph">Clear</button>
          </div>
          <label for="focus-layer-slider"><span>Layer</span><strong id="focus-layer-value">1</strong></label>
          <input id="focus-layer-slider" type="range" min="1" max="2" step="1" value="1" />
        </div>
        <div id="cluster-overlay" class="cluster-overlay" hidden></div>
        <div id="status-line" class="status-line">Loading viewer...</div>
        <div id="fps-counter" class="fps-counter">FPS --</div>
      </section>

      <div id="layout-settings-modal" class="modal-backdrop" hidden role="dialog" aria-modal="true" aria-labelledby="layout-settings-title">
        <div class="settings-modal">
          <div class="modal-header">
            <h2 id="layout-settings-title">Layout Settings</h2>
            <button id="close-layout-settings" class="modal-close" type="button" aria-label="Close layout settings" title="Close layout settings">X</button>
          </div>
          <div class="layout-settings-grid">
            <label>Repulsion<input type="number" min="0" max="6000" step="50" data-layout-setting="repulsion" /></label>
            <label>Link Distance<input type="number" min="20" max="800" step="10" data-layout-setting="linkDistance" /></label>
            <label>Link Strength<input type="number" min="0" max="0.2" step="0.005" data-layout-setting="linkStrength" /></label>
            <label>Collision Padding<input type="number" min="0" max="120" step="2" data-layout-setting="collisionPadding" /></label>
            <label>Collision Cell<input type="number" min="80" max="800" step="10" data-layout-setting="collisionCellSize" /></label>
            <label>Iterations<input type="number" min="0" max="12" step="1" data-layout-setting="relaxIterations" /></label>
            <label>Max Step<input type="number" min="5" max="300" step="5" data-layout-setting="maxStep" /></label>
            <label>Max Relax Nodes<input type="number" min="0" max="50000" step="500" data-layout-setting="relaxMaxPoints" /></label>
            <label>Barnes-Hut Theta<input type="number" min="0.3" max="1.5" step="0.01" data-layout-setting="barnesHutTheta" /></label>
            <label>Tree Depth<input type="number" min="8" max="24" step="1" data-layout-setting="maxDepth" /></label>
          </div>
          <div class="modal-actions">
            <button id="reset-layout-settings" class="btn secondary" type="button">Reset</button>
            <button id="apply-layout-settings" class="btn primary" type="button">Apply</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./main.js?v=1.30.44"></script>
</body>
</html>
