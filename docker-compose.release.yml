# CGA (ContextGraphAdmin) release compose file.
# Pulls prebuilt images from GitHub Container Registry instead of building locally.

services:
  cga:
    image: ghcr.io/nasco_microsoft/cga-api:${CGA_VERSION:-latest}
    container_name: cga-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - FALKORDB_URL=falkor://falkordb:6379
      - FALKORDB_URL_HOST=redis://falkordb:6379
      - FALKORDB_BROWSER_URL=http://falkordb:3000
      - FALKORDB_BROWSER_PUBLIC_URL=http://localhost:13000
      - QUEUE_REDIS_URL=redis://redis:6379/1
      - CACHE_REDIS_URL=redis://redis:6379/2
      - AUTH_DB_PATH=/app/data/auth.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-at-least-32-chars!!!!!}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - PYTHONPATH=/app/src
    volumes:
      - auth_db_data:/app/data
      - ${CGA_REPOS_MOUNT:-.}:/repos:ro
    depends_on:
      falkordb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  falkordb:
    image: falkordb/falkordb:latest
    container_name: cga-falkordb
    restart: unless-stopped
    ports:
      - "16379:6379"
      - "13000:3000"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: cga-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  auth_db_data:
  falkordb_data:
  redis_data: