# ──────────────────────────────────────────────────────────────────────────────
# ContextGraph Docker Compose
#
# PORT REGISTRY (ADC standard — do not change without updating ADC)
# ┌──────────────────────────────────────────────────────────────────────────┐
# │  Host Port │ Container Port │ Service                  │ Profile        │
# ├──────────────────────────────────────────────────────────────────────────┤
# │  8001      │ 8000           │ ContextGraph API (dev)   │ dev            │
# │  8000      │ 8000           │ ContextGraph API         │ prod           │
# │  8080      │ 8080           │ Gateway (nginx)          │ prod           │
# │  3001      │ 3000           │ Frontend (Next.js)       │ prod           │
# │  16379     │ 6379           │ FalkorDB (Redis proto)   │ dev + prod     │
# │  13000     │ 3000           │ FalkorDB Browser UI      │ dev + prod     │
# │  6380      │ 6379           │ Redis (dev)              │ dev            │
# └──────────────────────────────────────────────────────────────────────────┘
#
# Dev profile (fully Dockerised):
#   docker compose --profile dev up
#   Admin UI : http://localhost:8001/admin
#   FalkorDB Browser: http://localhost:13000
# ──────────────────────────────────────────────────────────────────────────────
services:

  falkordb-dev:
    image: 'falkordb/falkordb:latest'
    container_name: contextgraph-falkordb-dev
    profiles: [dev]
    restart: unless-stopped
    ports:
      - '16379:6379'
      - '13000:3000'
    volumes:
      - 'falkordb_dev_data:/data'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: contextgraph-api-dev
    profiles: [dev]
    restart: unless-stopped
    ports:
      - '8001:8000'
    env_file:
      - path: .env
        required: false
    environment:
      - FALKORDB_HOST=contextgraph-falkordb-dev
      - FALKORDB_PORT=6379
      - FALKORDB_URL=falkor://contextgraph-falkordb-dev:6379
      - FALKORDB_URL_HOST=redis://contextgraph-falkordb-dev:6379
      - QUEUE_REDIS_URL=redis://contextgraph-redis-dev:6379/1
      - CACHE_REDIS_URL=redis://contextgraph-redis-dev:6379/2
      - AUTH_DB_PATH=/app/data/auth.db
      - 'JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-local-jwt-secret-key}'
      - 'ADMIN_USERNAME=${ADMIN_USERNAME:-admin}'
      - 'ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}'
    volumes:
      - auth_db_dev_data:/app/data
    depends_on:
      falkordb-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    healthcheck:
      test: [CMD, curl, '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis-dev:
    image: 'redis:7-alpine'
    container_name: contextgraph-redis-dev
    profiles: [dev]
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - 'redis_dev_data:/data'
    command: 'redis-server --appendonly yes'
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 3s
      retries: 3

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway.prod
    container_name: your-app-gateway
    profiles: [prod]
    restart: unless-stopped
    expose:
      - '8080'
    labels:
      - coolify.managed=true
      - traefik.enable=true
      - traefik.docker.network=z00ws84oc40g48wo0kk844ws
      - traefik.http.routers.your-app-gateway-https.entryPoints=https
      - traefik.http.routers.your-app-gateway-https.rule=Host(`your-domain.com`)
      - traefik.http.routers.your-app-gateway-https.tls=true
      - traefik.http.services.your-app-gateway.loadbalancer.server.port=8080
      - traefik.http.routers.your-app-gateway-http.entryPoints=http
      - traefik.http.routers.your-app-gateway-http.rule=Host(`your-domain.com`)
      - traefik.http.routers.your-app-gateway-http.middlewares=redirect-to-https
    depends_on:
      - api
      - frontend
    networks:
      - your-app-network
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:8080/_gateway_health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: your-app-api
    profiles: [prod]
    restart: unless-stopped
    expose:
      - '8000'
    labels:
      - coolify.managed=true
      - traefik.enable=false
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - 'REDIS_URL=redis://redis:6379/0'
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - 'POSTGRES_DB=${POSTGRES_DB:-appdb}'
      - 'POSTGRES_USER=${POSTGRES_USER:-app}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}'
      - 'SECRET_KEY=${SECRET_KEY:-change-me-secret-key}'
      - 'JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-jwt-secret-key}'
      - 'AD_BASE_URL=${AD_BASE_URL:-http://localhost:8002}'
      - 'AD_OPERATOR_TOKEN=${AD_OPERATOR_TOKEN:-}'
      - 'AD_AGENCY_ROUTES=${AD_AGENCY_ROUTES:-}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY:-dummy-openai-key}'
      - 'OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}'
      - 'CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}'
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - 'QUEUE_REDIS_URL=redis://redis:6379/1'
      - AUTH_DB_PATH=/app/data/auth.db
      - 'JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-jwt-secret-key-32chars!!}'
      - 'ADMIN_USERNAME=${ADMIN_USERNAME:-admin}'
      - 'ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}'
      - 'MCP_ACCESS_TOKEN=${MCP_ACCESS_TOKEN:-}'
    volumes:
      - auth_db_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    networks:
      - your-app-network
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:8000/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
      args:
        - 'VUESTIC_ADMIN_REPO=https://github.com/epicmaxco/vuestic-admin'
        - 'VUESTIC_ADMIN_REF=master'
        - 'NEXT_PUBLIC_API_URL=https://your-domain.com'
        - 'API_URL=https://your-domain.com'
    container_name: your-app-frontend
    profiles: [prod]
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      - 'NEXT_PUBLIC_API_URL=https://your-domain.com'
      - NODE_ENV=production
      - 'API_URL=https://your-domain.com'
    labels:
      - coolify.managed=true
      - traefik.enable=false
    depends_on:
      - api
    networks:
      - your-app-network
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:3000'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  falkordb:
    image: 'falkordb/falkordb:latest'
    container_name: contextgraph-falkordb
    profiles: [prod]
    restart: unless-stopped
    ports:
      - '16379:6379'
      - '13000:3000'
    volumes:
      - 'falkordb_data:/data'
    networks:
      - your-app-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  redis:
    image: 'redis:7-alpine'
    container_name: your-app-redis
    profiles: [prod]
    restart: unless-stopped
    volumes:
      - 'redis_data:/data'
    networks:
      - your-app-network
    command: 'redis-server --appendonly yes'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 3
  postgres:
    image: 'pgvector/pgvector:pg16'
    container_name: your-app-postgres
    profiles: [prod]
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-appdb}'
      - 'POSTGRES_USER=${POSTGRES_USER:-app}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    networks:
      - your-app-network
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-appdb}'
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  falkordb_data:
    driver: local
  falkordb_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  auth_db_data:
    driver: local
  auth_db_dev_data:
    driver: local
networks:
  your-app-network:
    driver: bridge