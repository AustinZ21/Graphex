# ──────────────────────────────────────────────────────────────────────────────
# CGA (ContextGraphAgent) Docker Compose
#
# PORT REGISTRY (ADC standard — do not change without updating ADC)
# ┌──────────────────────────────────────────────────────────────────────────┐
# │  Host Port │ Container Port │ Service                  │ Profile        │
# ├──────────────────────────────────────────────────────────────────────────┤
# │  8001      │ 8000           │ CGA API (dev)            │ dev            │
# │  8000      │ 8000           │ CGA API                  │ prod           │
# │  8080      │ 8080           │ Gateway (nginx)          │ prod           │
# │  3001      │ 3000           │ Frontend (Next.js)       │ prod           │
# │  16379     │ 6379           │ FalkorDB (Redis proto)   │ dev + prod     │
# │  13000     │ 3000           │ FalkorDB Browser UI      │ dev + prod     │
# │  6380      │ 6379           │ Redis (dev)              │ dev            │
# │  15433     │ 5432           │ Postgres (pgvector, dev) │ dev            │
# │  15432     │ 5432           │ Postgres (pgvector, desktop) │ desktop    │
# └──────────────────────────────────────────────────────────────────────────┘
#
# Dev profile (fully Dockerised):
#   docker compose --profile dev up
#   Admin UI : http://localhost:8001/admin
#   FalkorDB Browser: http://localhost:13000
# ──────────────────────────────────────────────────────────────────────────────
services:

  falkordb-dev:
    image: 'falkordb/falkordb:latest'
    container_name: cga-falkordb-dev
    profiles: [dev]
    restart: unless-stopped
    ports:
      - '16379:6379'
      - '13000:3000'
    volumes:
      - 'falkordb_dev_data:/data'
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cga-api-dev
    profiles: [dev]
    restart: unless-stopped
    ports:
      - '8001:8000'
    env_file:
      - path: .env
        required: false
    environment:
      - FALKORDB_HOST=cga-falkordb-dev
      - FALKORDB_PORT=6379
      - FALKORDB_URL=falkor://cga-falkordb-dev:6379
      - FALKORDB_URL_HOST=redis://cga-falkordb-dev:6379
      - QUEUE_REDIS_URL=redis://cga-redis-dev:6379/1
      - CACHE_REDIS_URL=redis://cga-redis-dev:6379/2
      - 'JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-local-jwt-secret-key}'
      - 'ADMIN_USERNAME=${ADMIN_USERNAME:-admin}'
      - 'ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}'
      - 'GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID:-}'
      - 'GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET:-}'
      - 'GITHUB_OAUTH_CALLBACK_URL=${GITHUB_OAUTH_CALLBACK_URL:-http://localhost:8001/api/auth/github/callback}'
      - 'GITHUB_OAUTH_SCOPE=${GITHUB_OAUTH_SCOPE:-read:user user:email}'
      - 'GITHUB_OAUTH_DEFAULT_ROLE=${GITHUB_OAUTH_DEFAULT_ROLE:-viewer}'
      - 'GITHUB_OAUTH_ALLOWED_USERS=${GITHUB_OAUTH_ALLOWED_USERS:-}'
      - 'GITHUB_OAUTH_ALLOWED_ORGS=${GITHUB_OAUTH_ALLOWED_ORGS:-}'
      - 'GITHUB_OAUTH_STATE_SECRET=${GITHUB_OAUTH_STATE_SECRET:-dev-local-oauth-state-secret}'
      - PYTHONPATH=/app/src
      - 'CGA_POSTGRES_DSN=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@cga-postgres-dev:5432/${POSTGRES_DB:-appdb}'
      - 'WORKBRIEFING_POSTGRES_DSN=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@cga-postgres-dev:5432/${POSTGRES_DB:-appdb}'
      # Auth backups land in the same host folder the dev backup sidecar
      # writes to so the admin UI lists exactly those snapshots.
      - BACKUP_DIR=/backups/cga-dev/auth
    volumes:
      - ${CGA_BACKUP_DIR:-./data/backups}:/backups
      - ${CGA_REPOS_MOUNT:-.}:/repos:ro
    depends_on:
      falkordb-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
      postgres-dev:
        condition: service_healthy
    healthcheck:
      test: [CMD, curl, '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis-dev:
    image: 'redis:7-alpine'
    container_name: cga-redis-dev
    profiles: [dev]
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - 'redis_dev_data:/data'
    command: 'redis-server --appendonly yes'
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres-dev:
    image: 'pgvector/pgvector:pg16'
    container_name: cga-postgres-dev
    profiles: [dev]
    restart: unless-stopped
    ports:
      - '${CGA_DEV_POSTGRES_PORT:-15433}:5432'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-appdb}'
      - 'POSTGRES_USER=${POSTGRES_USER:-app}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}'
    volumes:
      - 'postgres_dev_data:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-appdb}'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backup-dev:
    image: 'postgres:16-alpine'
    container_name: cga-backup-dev
    profiles: [dev]
    restart: unless-stopped
    environment:
      - BACKUP_STACK_NAME=cga-dev
      - BACKUP_ROOT=/backups
      - PGHOST=cga-postgres-dev
      - PGPORT=5432
      - 'PGUSER=${POSTGRES_USER:-app}'
      - 'PGDATABASE=${POSTGRES_DB:-appdb}'
      - 'PGPASSWORD=${POSTGRES_PASSWORD:-app}'
      - FALKORDB_DATA_DIR=/falkordb-data
      - 'BACKUP_INTERVAL_SECONDS=${CGA_BACKUP_INTERVAL_SECONDS:-3600}'
      - 'BACKUP_KEEP_COUNT=${CGA_BACKUP_KEEP_COUNT:-168}'
    volumes:
      - falkordb_dev_data:/falkordb-data:ro
      - ${CGA_BACKUP_DIR:-./data/backups}:/backups
      - ./src/scripts/backup-runtime-data.sh:/usr/local/bin/backup-runtime-data.sh:ro
    entrypoint: ['/bin/sh', '/usr/local/bin/backup-runtime-data.sh']
    depends_on:
      postgres-dev:
        condition: service_healthy
      falkordb-dev:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway.prod
    container_name: your-app-gateway
    profiles: [prod]
    restart: unless-stopped
    expose:
      - '8080'
    labels:
      - coolify.managed=true
      - traefik.enable=true
      - traefik.docker.network=z00ws84oc40g48wo0kk844ws
      - traefik.http.routers.your-app-gateway-https.entryPoints=https
      - traefik.http.routers.your-app-gateway-https.rule=Host(`your-domain.com`)
      - traefik.http.routers.your-app-gateway-https.tls=true
      - traefik.http.services.your-app-gateway.loadbalancer.server.port=8080
      - traefik.http.routers.your-app-gateway-http.entryPoints=http
      - traefik.http.routers.your-app-gateway-http.rule=Host(`your-domain.com`)
      - traefik.http.routers.your-app-gateway-http.middlewares=redirect-to-https
    depends_on:
      - api
      - frontend
    networks:
      - your-app-network
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:8080/_gateway_health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: your-app-api
    profiles: [prod]
    restart: unless-stopped
    expose:
      - '8000'
    labels:
      - coolify.managed=true
      - traefik.enable=false
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - 'REDIS_URL=redis://redis:6379/0'
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - 'POSTGRES_DB=${POSTGRES_DB:-appdb}'
      - 'POSTGRES_USER=${POSTGRES_USER:-app}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}'
      - 'SECRET_KEY=${SECRET_KEY:-change-me-secret-key}'
      - 'JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-jwt-secret-key}'
      - 'AD_BASE_URL=${AD_BASE_URL:-http://localhost:8002}'
      - 'AD_OPERATOR_TOKEN=${AD_OPERATOR_TOKEN:-}'
      - 'AD_AGENCY_ROUTES=${AD_AGENCY_ROUTES:-}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY:-dummy-openai-key}'
      - 'OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}'
      - 'CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}'
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - 'QUEUE_REDIS_URL=redis://redis:6379/1'
      - 'JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-jwt-secret-key-32chars!!}'
      - 'ADMIN_USERNAME=${ADMIN_USERNAME:-admin}'
      - 'ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}'
      - 'GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID:-}'
      - 'GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET:-}'
      - 'GITHUB_OAUTH_CALLBACK_URL=${GITHUB_OAUTH_CALLBACK_URL:-https://your-domain.com/api/auth/github/callback}'
      - 'GITHUB_OAUTH_SCOPE=${GITHUB_OAUTH_SCOPE:-read:user user:email}'
      - 'GITHUB_OAUTH_DEFAULT_ROLE=${GITHUB_OAUTH_DEFAULT_ROLE:-viewer}'
      - 'GITHUB_OAUTH_ALLOWED_USERS=${GITHUB_OAUTH_ALLOWED_USERS:-}'
      - 'GITHUB_OAUTH_ALLOWED_ORGS=${GITHUB_OAUTH_ALLOWED_ORGS:-}'
      - 'GITHUB_OAUTH_STATE_SECRET=${GITHUB_OAUTH_STATE_SECRET:-change-me-oauth-state-secret}'
      - 'MCP_ACCESS_TOKEN=${MCP_ACCESS_TOKEN:-}'
      - 'CGA_POSTGRES_DSN=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-appdb}'
      # Prod has no backup sidecar; the in-process scheduler owns auth backups.
      - BACKUP_DIR=/backups/cga/auth
    volumes:
      - backup_prod_data:/backups
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    networks:
      - your-app-network
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:8000/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
      args:
        - 'VUESTIC_ADMIN_REPO=https://github.com/epicmaxco/vuestic-admin'
        - 'VUESTIC_ADMIN_REF=master'
        - 'NEXT_PUBLIC_API_URL=https://your-domain.com'
        - 'API_URL=https://your-domain.com'
    container_name: your-app-frontend
    profiles: [prod]
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      - 'NEXT_PUBLIC_API_URL=https://your-domain.com'
      - NODE_ENV=production
      - 'API_URL=https://your-domain.com'
    labels:
      - coolify.managed=true
      - traefik.enable=false
    depends_on:
      - api
    networks:
      - your-app-network
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:3000'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  falkordb:
    image: 'falkordb/falkordb:latest'
    container_name: cga-falkordb
    profiles: [prod]
    restart: unless-stopped
    ports:
      - '16379:6379'
      - '13000:3000'
    volumes:
      - 'falkordb_data:/data'
    networks:
      - your-app-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  redis:
    image: 'redis:7-alpine'
    container_name: your-app-redis
    profiles: [prod]
    restart: unless-stopped
    volumes:
      - 'redis_data:/data'
    networks:
      - your-app-network
    command: 'redis-server --appendonly yes'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 3s
      retries: 3
  postgres:
    image: 'pgvector/pgvector:pg16'
    container_name: your-app-postgres
    profiles: [prod]
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-appdb}'
      - 'POSTGRES_USER=${POSTGRES_USER:-app}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    networks:
      - your-app-network
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-appdb}'
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  falkordb_data:
    driver: local
  falkordb_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  postgres_dev_data:
    driver: local
  backup_prod_data:
    driver: local
networks:
  your-app-network:
    driver: bridge