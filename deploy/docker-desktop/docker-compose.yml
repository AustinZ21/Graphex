name: cga-desktop-bundle

services:
  cga:
    build:
      context: ../..
      dockerfile: Dockerfile.dev
    image: cga-desktop-bundle-cga:local
    restart: unless-stopped
    ports:
      - "${CGA_DESKTOP_API_PORT:-18001}:8000"
    env_file:
      - path: .env
        required: false
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - FALKORDB_URL=falkor://falkordb:6379
      - FALKORDB_URL_HOST=redis://localhost:${CGA_DESKTOP_FALKORDB_PORT:-16381}
      - FALKORDB_BROWSER_URL=http://falkordb:3000
      - FALKORDB_BROWSER_PUBLIC_URL=http://localhost:${CGA_DESKTOP_BROWSER_PORT:-13001}
      - QUEUE_REDIS_URL=redis://redis:6379/1
      - CACHE_REDIS_URL=redis://redis:6379/2
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-at-least-32-chars!!!!!}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - GITHUB_OAUTH_CALLBACK_URL=${GITHUB_OAUTH_CALLBACK_URL:-http://localhost:${CGA_DESKTOP_API_PORT:-18001}/api/auth/github/callback}
      - PYTHONPATH=/app/src
      - MCP_ACCESS_TOKEN=${MCP_ACCESS_TOKEN:-}
      - CGA_POSTGRES_DSN=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-appdb}
      - WORKBRIEFING_POSTGRES_DSN=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-appdb}
      # cga writes manual/UI snapshots into the same host folder the backup
      # sidecar uses, so the admin UI lists exactly the scheduled snapshots.
      - BACKUP_DIR=/backups/cga-desktop-bundle/auth
    volumes:
      - ${CGA_BACKUP_DIR:-./data/backups}:/backups
      - "${CGA_REPOS_MOUNT:-../../}:/repos:ro"
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
      - POSTGRES_USER=${POSTGRES_USER:-app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  falkordb:
    image: falkordb/falkordb:latest
    restart: unless-stopped
    ports:
      - "${CGA_DESKTOP_FALKORDB_PORT:-16381}:6379"
      - "${CGA_DESKTOP_BROWSER_PORT:-13001}:3000"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - BACKUP_STACK_NAME=cga-desktop-bundle
      - BACKUP_ROOT=/backups
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=${POSTGRES_USER:-app}
      - PGDATABASE=${POSTGRES_DB:-appdb}
      - PGPASSWORD=${POSTGRES_PASSWORD:-app}
      - FALKORDB_DATA_DIR=/falkordb-data
      - BACKUP_INTERVAL_SECONDS=${CGA_BACKUP_INTERVAL_SECONDS:-3600}
      - BACKUP_KEEP_COUNT=${CGA_BACKUP_KEEP_COUNT:-168}
    volumes:
      - falkordb_data:/falkordb-data:ro
      - ${CGA_BACKUP_DIR:-./data/backups}:/backups
      - ../../src/scripts/backup-runtime-data.sh:/usr/local/bin/backup-runtime-data.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup-runtime-data.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      falkordb:
        condition: service_healthy

volumes:
  postgres_data:
  falkordb_data:
  redis_data:
