[pytest]
testpaths = src/tests
addopts = -q --cov=src --cov-branch --cov-report=term-missing
pythonpath = src
asyncio_mode = auto
markers =
	live_graph: requires a live FalkorDB instance
	live_graph_smoke: lightweight live FalkorDB graph validation
	live_graph_e2e: end-to-end MCP retrieval validation on live graph
