name: Policy CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-security:
    runs-on: ubuntu-latest
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 16379:6379
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run tests with coverage gate
        id: coverage
        continue-on-error: true
        env:
          FALKORDB_HOST: localhost
          FALKORDB_PORT: "16379"
          QUEUE_REDIS_URL: redis://localhost:6380/1
          CACHE_REDIS_URL: redis://localhost:6380
          BACKUP_DIR: ${{ github.workspace }}/data/backups
        run: |
          mkdir -p .ci-logs
          set -o pipefail
          pytest --cov=src --cov-report=term-missing --cov-fail-under=75 2>&1 | tee .ci-logs/coverage.log

      - name: Run live graph smoke tests
        id: smoke
        continue-on-error: true
        env:
          FALKORDB_HOST: localhost
          FALKORDB_PORT: "16379"
          QUEUE_REDIS_URL: redis://localhost:6380/1
          CACHE_REDIS_URL: redis://localhost:6380
          BACKUP_DIR: ${{ github.workspace }}/data/backups
        run: |
          mkdir -p .ci-logs
          set -o pipefail
          pytest -m live_graph_smoke -q 2>&1 | tee .ci-logs/live_graph_smoke.log

      - name: Run live graph end-to-end tests
        id: e2e
        continue-on-error: true
        env:
          FALKORDB_HOST: localhost
          FALKORDB_PORT: "16379"
          QUEUE_REDIS_URL: redis://localhost:6380/1
          CACHE_REDIS_URL: redis://localhost:6380
          BACKUP_DIR: ${{ github.workspace }}/data/backups
        run: |
          mkdir -p .ci-logs
          set -o pipefail
          pytest -m live_graph_e2e -q 2>&1 | tee .ci-logs/live_graph_e2e.log

      - name: Summarize test lanes
        if: always()
        run: |
          {
            echo "## Test Lane Summary"
            echo ""
            echo "- coverage: ${{ steps.coverage.outcome }}"
            echo "- live_graph_smoke: ${{ steps.smoke.outcome }}"
            echo "- live_graph_e2e: ${{ steps.e2e.outcome }}"
            echo ""
            if [[ "${{ steps.coverage.outcome }}" != "success" ]]; then
              echo "### coverage failure (tail)"
              echo '```text'
              tail -n 80 .ci-logs/coverage.log || true
              echo '```'
              echo ""
            fi
            if [[ "${{ steps.smoke.outcome }}" != "success" ]]; then
              echo "### live_graph_smoke failure (tail)"
              echo '```text'
              tail -n 80 .ci-logs/live_graph_smoke.log || true
              echo '```'
              echo ""
            fi
            if [[ "${{ steps.e2e.outcome }}" != "success" ]]; then
              echo "### live_graph_e2e failure (tail)"
              echo '```text'
              tail -n 80 .ci-logs/live_graph_e2e.log || true
              echo '```'
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload lane logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-lane-logs
          path: .ci-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Enforce test lane success
        if: always()
        run: |
          if [[ "${{ steps.coverage.outcome }}" != "success" || "${{ steps.smoke.outcome }}" != "success" || "${{ steps.e2e.outcome }}" != "success" ]]; then
            echo "One or more test lanes failed. See Test Lane Summary above."
            exit 1
          fi

      - name: Enforce vulnerability exception expiry
        env:
          VULN_EXCEPTION_ID: CVE-2026-4539
          VULN_EXCEPTION_EXPIRES: "2026-05-31"
        run: |
          TODAY="$(date -u +%F)"
          if [[ "$TODAY" > "$VULN_EXCEPTION_EXPIRES" ]]; then
            echo "Temporary vulnerability exception expired: $VULN_EXCEPTION_ID (expired $VULN_EXCEPTION_EXPIRES)."
            echo "Remove ignore or update dependency to a fixed version."
            exit 1
          fi

      - name: Run dependency vulnerability audit
        env:
          VULN_EXCEPTION_ID: CVE-2026-4539
        run: |
          pip-audit -r requirements.txt --ignore-vuln "$VULN_EXCEPTION_ID"

  pr-policy-checklist:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR policy checklist text
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "PR body is empty. Fill in the policy checklist in the PR template."
            exit 1
          fi

          echo "$PR_BODY" | grep -qi "JWT/token entropy policy applied" || {
            echo "Missing JWT/token entropy checklist item in PR body."
            exit 1
          }

          echo "$PR_BODY" | grep -qi "Data policy applied for pgvector/sqlite-vec/graph" || {
            echo "Missing data policy checklist item in PR body."
            exit 1
          }
